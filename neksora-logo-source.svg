<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="680" height="220" viewBox="0 0 680 220">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Golos+Text:wght@700&amp;display=swap');
      .wm { font-family: 'Golos Text', 'Arial', sans-serif; font-weight: 700; font-size: 30px; letter-spacing: 3px; }
      .cap { font-family: 'Arial', sans-serif; font-weight: 400; font-size: 11px; letter-spacing: 1px; fill: #8AA0BF; }
    </style>
  </defs>

  <!-- Dark version background -->
  <rect width="340" height="220" fill="#070B14"/>

  <!-- Dark version icon -->
  <g transform="translate(48, 82)">
    <rect width="48" height="48" rx="9" fill="#00D9FF"/>
    <path d="M13 35 L35 13 M22 13 L35 13 L35 26" stroke="#070B14" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Dark version wordmark -->
  <text x="114" y="116" class="wm" fill="#E6EEF8">НЭКСОРА</text>
  <text x="170" y="188" text-anchor="middle" class="cap">ТЁМНАЯ ВЕРСИЯ</text>

  <!-- Divider -->
  <line x1="340" y1="24" x2="340" y2="196" stroke="#1C2A3A" stroke-width="1"/>

  <!-- Light version background -->
  <rect x="340" width="340" height="220" fill="#F0F4F8"/>

  <!-- Light version icon -->
  <g transform="translate(388, 82)">
    <rect width="48" height="48" rx="9" fill="#0A0F1E"/>
    <path d="M13 35 L35 13 M22 13 L35 13 L35 26" stroke="#00D9FF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- Light version wordmark -->
  <text x="454" y="116" class="wm" fill="#0A0F1E">НЭКСОРА</text>
  <text x="510" y="188" text-anchor="middle" class="cap" fill="#8AA0BF">СВЕТЛАЯ ВЕРСИЯ</text>
</svg>
